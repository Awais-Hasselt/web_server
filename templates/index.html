<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slimme Regenton - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-8">
            <div class="text-4xl mb-4">💧</div>
            <h1 class="text-2xl font-bold text-slate-800">Mijn Regenton</h1>
            <p class="text-slate-500 text-sm">Voer de naam van je ton in om het dashboard te openen.</p>
        </div>

        <form method="POST" class="space-y-4">
            <div>
                <input type="text" name="barrel_name" placeholder="Naam van de ton..." 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
                       required>
            </div>

            {% if error %}
            <div class="bg-red-50 border border-red-200 text-red-600 text-xs p-3 rounded-lg">
                {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-200 transform hover:-translate-y-0.5">
                Dashboard Openen
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-semibold italic">
                Verbonden via Vercel Cloud
            </p>
        </div>
    </div>
</body>
</html>
