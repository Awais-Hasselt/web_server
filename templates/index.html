<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awais - Smart Rain Barrel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
        <h1 class="text-4xl font-extrabold text-blue-600 mb-6">Awais</h1>
        
        <form method="POST" class="mb-6">
            <label for="barrel_name" class="block text-left text-sm font-medium text-gray-700 mb-2">Naam van de regenton (in Dutch)</label>
            <input type="text" id="barrel_name" name="barrel_name" required placeholder="Bijv. Achtertuin Ton" 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4">
            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition">
                Go to Dashboard
            </button>
        </form>

        <a href="/setup" class="text-sm text-blue-500 hover:underline">How to setup your Awais barrel</a>
    </div>
</body>
</html>
