
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --stone: #f5f0e8; --stone2: #ede7d9; --stone3: #d4c9b5; --stone4: #a89880;
    --green: #2d5a3d; --green2: #3d7a52; --green3: #5a9e6f; --green-light: #e8f3ec;
    --water: #4a8db5; --water-light: #deeef7; --water-dark: #2a6080;
    --amber: #c17f3a; --amber-light: #fdf3e3;
    --text: #2a2217; --text2: #5c4f3d; --text3: #8a7a68;
    --rain: #7a9bb5; --rain-light: #eaf0f6;
    --sun: #d4a017;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  .app { background: var(--stone); min-height: 600px; color: var(--text); }

  .topbar { background: var(--green); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  .barrel-name { font-family: 'Fraunces', serif; font-weight: 300; font-size: 22px; letter-spacing: 0.5px; }
  .barrel-name em { font-style: italic; color: rgba(255,255,255,0.65); font-size: 14px; display: block; font-family: 'DM Sans', sans-serif; margin-top: 1px; }
  .top-stats { display: flex; gap: 20px; align-items: center; }
  .top-stat { text-align: center; }
  .top-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.65; }
  .top-stat-val { font-size: 20px; font-weight: 500; }
  .top-stat-val.water-val { color: #a8d8f0; }
  .divider { width: 1px; height: 36px; background: rgba(255,255,255,0.2); }
  .bat-bar { display: flex; gap: 2px; margin-top: 4px; justify-content: center; }
  .bat-seg { width: 8px; height: 12px; border-radius: 2px; background: rgba(255,255,255,0.15); }
  .bat-seg.on { background: #7ec99a; }

  .main { display: grid; grid-template-columns: 240px 1fr; gap: 0; min-height: 520px; }
  .sidebar { background: var(--stone2); border-right: 1px solid var(--stone3); padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }

  .water-widget { background: white; border-radius: 12px; padding: 16px; border: 1px solid var(--stone3); text-align: center; }
  .water-tank-wrap { position: relative; width: 70px; height: 110px; margin: 12px auto 8px; border-radius: 4px 4px 8px 8px; border: 2px solid var(--stone3); overflow: hidden; background: #f0f8ff; }
  .water-fill-anim { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, var(--water) 0%, #7bb5d4 100%); border-radius: 0 0 6px 6px; transition: height 1s ease; }
  .tank-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .tank-val { font-family: 'Fraunces', serif; font-size: 24px; color: var(--water-dark); font-weight: 500; }
  .tank-max { font-size: 10px; color: var(--text3); }
  .wave { position: absolute; top: 0; left: -10px; width: 120%; height: 12px; }

  .weather-now { background: white; border-radius: 12px; padding: 14px; border: 1px solid var(--stone3); }
  .weather-now-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 8px; }
  .weather-current { display: flex; align-items: center; gap: 10px; }
  .weather-icon-big { font-size: 28px; }
  .weather-temp-big { font-family: 'Fraunces', serif; font-size: 28px; color: var(--text); }
  .weather-desc { font-size: 12px; color: var(--text2); }

  .rain-hint { padding: 10px 12px; border-radius: 8px; font-size: 12px; color: var(--green); background: var(--green-light); border: 1px solid #b5d9c2; line-height: 1.4; }
  .rain-hint.warn { background: var(--rain-light); color: var(--rain); border-color: #b8ccdb; }

  .toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: var(--stone3); border-radius: 20px; transition: background 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--green2); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: white; border-radius: 50%; transition: transform 0.2s; }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  .content { padding: 20px 24px; overflow-x: auto; }
  .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .content-title { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 300; color: var(--text); }
  .edit-btn { background: var(--green); color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; }

  .calendar-nav { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .day-tab { padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--stone3); background: white; color: var(--text2); transition: all 0.15s; }
  .day-tab.active { background: var(--green); color: white; border-color: var(--green); }
  .day-tab.has-schedule { font-weight: 500; }
  .day-tab.rainy { border-color: var(--rain); color: var(--rain); }
  .day-tab.rainy.active { background: var(--rain); color: white; }

  .day-view { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .day-detail { background: white; border-radius: 12px; border: 1px solid var(--stone3); padding: 16px; }
  .day-detail-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 12px; }
  .level-display { display: flex; align-items: center; gap: 10px; }
  .mini-tank { position: relative; width: 30px; height: 50px; border: 1.5px solid var(--stone3); border-radius: 3px 3px 5px 5px; overflow: hidden; background: #f0f8ff; }
  .mini-fill { position: absolute; bottom: 0; width: 100%; background: var(--water); border-radius: 0 0 3px 3px; }
  .level-text { font-family: 'Fraunces', serif; font-size: 20px; color: var(--water-dark); }
  .level-sub { font-size: 11px; color: var(--text3); }

  .timeline { position: relative; }
  .timeline-row { display: flex; align-items: center; gap: 8px; height: 28px; border-bottom: 1px solid var(--stone2); }
  .time-label { font-size: 10px; color: var(--text3); width: 36px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .slot-bar { height: 14px; border-radius: 3px; flex: 1; display: flex; gap: 2px; }
  .slot-block { height: 14px; border-radius: 3px; display: flex; align-items: center; padding: 0 6px; }
  .slot-block.type-1 { background: #ddf0e4; color: #2d5a3d; }
  .slot-block.type-2 { background: #d4eaf7; color: #2a6080; }
  .slot-block.type-3 { background: #ffe8cc; color: #8a4a10; }
  .slot-block.type-f { background: #e8d0f0; color: #5a2a7a; }
  .slot-label { font-size: 9px; font-weight: 500; white-space: nowrap; }

  .schedule-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .sched-day-mini { background: white; border-radius: 8px; border: 1px solid var(--stone3); padding: 8px; min-height: 80px; }
  .sched-day-mini.today { border-color: var(--green); background: var(--green-light); }
  .sched-day-mini.rainy { border-color: var(--rain-light); }
  .sched-day-header { font-size: 10px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
  .sched-day-date { font-size: 9px; color: var(--text3); }
  .sched-day-icon { font-size: 14px; float: right; }
  .sched-mini-block { height: 5px; border-radius: 2px; margin-bottom: 2px; }
  .no-sched { font-size: 9px; color: var(--text3); font-style: italic; }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(30,20,10,0.5); z-index: 100; align-items: center; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: white; border-radius: 16px; width: 560px; max-width: 95vw; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
  .modal-head { background: var(--green); color: white; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .modal-head h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 18px; }
  .modal-close { background: none; border: none; color: white; font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-tabs { display: flex; border-bottom: 1px solid var(--stone2); }
  .modal-tab { padding: 10px 18px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text3); }
  .modal-tab.active { border-color: var(--green); color: var(--green); font-weight: 500; }
  .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .modal-foot { padding: 12px 20px; border-top: 1px solid var(--stone2); display: flex; justify-content: flex-end; gap: 8px; }
  .btn-sec { background: white; border: 1px solid var(--stone3); border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
  .btn-pri { background: var(--green); color: white; border: none; border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-weight: 500; }

  .sched-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--stone2); }
  .sched-time { font-size: 12px; font-variant-numeric: tabular-nums; color: var(--text2); width: 40px; }
  .sched-pills { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
  .pill { padding: 3px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1.5px solid transparent; transition: all 0.1s; user-select: none; }
  .pill.off { background: var(--stone2); color: var(--text3); }
  .pill.p1 { background: #ddf0e4; color: #2d5a3d; border-color: #2d5a3d; }
  .pill.p2 { background: #d4eaf7; color: #2a6080; border-color: #2a6080; }
  .pill.p3 { background: #ffe8cc; color: #8a4a10; border-color: #c27a35; }
  .pill.pf { background: #e8d0f0; color: #5a2a7a; border-color: #8a4ab5; }
  .pill:hover { opacity: 0.8; transform: scale(1.05); }

  .weather-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .weather-day-card { flex: 1; background: var(--stone2); border-radius: 8px; padding: 8px; text-align: center; border: 1px solid var(--stone3); }
  .weather-day-card.today { background: var(--green-light); border-color: var(--green3); }
  .wdc-name { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); }
  .wdc-icon { font-size: 18px; margin: 3px 0; }
  .wdc-temp { font-size: 12px; font-weight: 500; color: var(--text); }
  .wdc-rain { font-size: 9px; color: var(--rain); }
</style>

<div class="app">

    <div>
      <div class="barrel-name">De Grote Ton <em>Bijgewerkt 4 min. geleden</em></div>
    </div>
    <div class="top-stats">
      <div class="top-stat">
        <div class="top-stat-label">Batterij</div>
        <div class="bat-bar" id="bat-bar"></div>
      </div>
      <div class="divider"></div>
      <div class="top-stat">
        <div class="top-stat-label">Waterniveau</div>
        <div class="top-stat-val water-val" id="top-water">— L</div>
      </div>
      <div class="divider"></div>

<script>
const MAX_L = (Math.PI * 25 * 25 * 90) / 1000;
const WATER_L = 98.4;
const BATTERY = 3;
const typeMap = { '1': 'Sip', '2': 'Rustig', '3': 'Zwaar', 'f': 'Vloed' };
const typeColor = { '1': '#ddf0e4', '2': '#d4eaf7', '3': '#ffe8cc', 'f': '#e8d0f0' };
const typeText = { '1': '#2d5a3d', '2': '#2a6080', '3': '#8a4a10', 'f': '#5a2a7a' };
const days = ['Zo', 'Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za'];
const daysLong = ['Zondag', 'Maandag', 'Dinsdag', 'Woensdag', 'Donderdag', 'Vrijdag', 'Zaterdag'];
const slots = Array.from({length: 48}, (_, i) => `${String(Math.floor(i/2)).padStart(2,'0')}:${i%2===0?'00':'30'}`);

let todaySched = '-'.repeat(48).split('');
let tomorrowSched = ('-'.repeat(48)).split('');
todaySched[14] = '2'; todaySched[15] = '2'; todaySched[28] = '3'; todaySched[29] = '3';
tomorrowSched[12] = '1'; tomorrowSched[13] = '1';

let weatherData = {};
let selectedDay = 0;
let modalTab = 'today';
let editToday = [...todaySched];
let editTomorrow = [...tomorrowSched];
let cancelRainy = true;

function initBattery() {
  const bar = document.getElementById('bat-bar');
  bar.innerHTML = Array.from({length:5}, (_,i) => `<div class="bat-seg ${i < BATTERY ? 'on' : ''}"></div>`).join('');
}

function initWater() {
  const pct = (WATER_L / MAX_L) * 100;
  document.getElementById('top-water').textContent = WATER_L.toFixed(1) + ' L';
  document.getElementById('sidebar-water').textContent = WATER_L.toFixed(1) + ' L';
  document.getElementById('sidebar-max').textContent = `van ${MAX_L.toFixed(0)} L max`;
  setTimeout(() => { document.getElementById('tank-fill').style.height = Math.min(pct,100) + '%'; }, 200);
}

function getWeatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 49) return '🌫️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '❄️';
  if (code <= 82) return '🌦️';
  if (code >= 95) return '⛈️';
  return '🌤️';
}

function getWeatherDesc(code) {
  if (code === 0) return 'Zonnig';
  if (code <= 2) return 'Gedeeltelijk bewolkt';
  if (code <= 3) return 'Bewolkt';
  if (code <= 49) return 'Mistig';
  if (code <= 67) return 'Regen';
  if (code <= 77) return 'Sneeuw';
  if (code <= 82) return 'Regenbuien';
  if (code >= 95) return 'Onweer';
  return 'Wisselvallig';
}

function isRainy(code) { return code >= 51; }

function loadWeather() {
  fetch('https://api.open-meteo.com/v1/forecast?latitude=50.9094&longitude=5.4179&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&current_weather=true&timezone=auto&forecast_days=7')
    .then(r => r.json())
    .then(d => {
      const cw = d.current_weather;
      document.getElementById('w-icon-now').textContent = getWeatherIcon(cw.weathercode);
      document.getElementById('w-temp-now').textContent = cw.temperature + '°C';
      document.getElementById('w-desc-now').textContent = getWeatherDesc(cw.weathercode);
      document.getElementById('top-weather').innerHTML = `<div class="top-stat-label">Nu</div><div class="top-stat-val">${getWeatherIcon(cw.weathercode)} ${cw.temperature}°C</div>`;

      d.daily.time.forEach((date, i) => {
        weatherData[date] = {
          code: d.daily.weathercode[i],
          maxT: d.daily.temperature_2m_max[i],
          minT: d.daily.temperature_2m_min[i],
          precip: d.daily.precipitation_probability_max[i],
          rainy: isRainy(d.daily.weathercode[i])
        };
      });

      updateRainHint();
      renderWeatherRow();
      renderScheduleGrid();
      renderDayDetail();
    })
    .catch(() => {
      document.getElementById('rain-hint').textContent = 'Kon weerdata niet laden.';
      renderWeatherRow();
      renderScheduleGrid();
      renderDayDetail();
    });
}

function updateRainHint() {
  const hint = document.getElementById('rain-hint');
  const today = new Date().toISOString().split('T')[0];
  const w = weatherData[today];
  if (!w) return;
  if (w.rainy && cancelRainy) {
    hint.className = 'rain-hint warn';
    hint.textContent = `🌧 Vandaag ${w.precip}% kans op regen — schema wordt automatisch gepauzeerd.`;
  } else if (w.precip > 30) {
    hint.className = 'rain-hint warn';
    hint.textContent = `🌦 ${w.precip}% kans op regen vandaag. Overweeg minder te beregenen.`;
  } else {
    hint.className = 'rain-hint';
    hint.textContent = `☀️ Goed weer voor beregening vandaag. Max ${w.maxT?.toFixed(0)}°C.`;
  }
}

function getDateOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d;
}

function renderWeatherRow() {
  const row = document.getElementById('weather-row');
  row.innerHTML = '';
  for (let i = -2; i <= 4; i++) {
    const d = getDateOffset(i);
    const key = d.toISOString().split('T')[0];
    const w = weatherData[key] || { code: 0, maxT: '—', precip: 0, rainy: false };
    const isToday = i === 0;
    row.innerHTML += `
      <div class="weather-day-card ${isToday ? 'today' : ''}" onclick="selectDay(${i})" style="cursor:pointer">
        <div class="wdc-name">${isToday ? 'Vandaag' : days[d.getDay()]}</div>
        <div class="wdc-icon">${getWeatherIcon(w.code)}</div>
        <div class="wdc-temp">${w.maxT !== undefined ? Math.round(w.maxT) + '°' : '—'}</div>
        <div class="wdc-rain" style="visibility:${w.precip > 10 ? 'visible' : 'hidden'}">${w.precip}% 💧</div>
      </div>`;
  }
}

function renderScheduleGrid() {
  const grid = document.getElementById('schedule-grid');
  grid.innerHTML = '';
  for (let i = -3; i <= 3; i++) {
    const d = getDateOffset(i);
    const key = d.toISOString().split('T')[0];
    const w = weatherData[key] || { code: 0, rainy: false };
    const isToday = i === 0;
    const sched = i === 0 ? todaySched : i === 1 ? tomorrowSched : null;
    const tasks = sched ? sched.map((s,j) => ({s, j})).filter(x => x.s !== '-') : [];
    const muted = cancelRainy && w.rainy;

    let taskBars = tasks.slice(0,5).map(t => `<div class="sched-mini-block" style="background:${muted ? '#ccc' : typeColor[t.s]};width:${100/tasks.length}%"></div>`).join('');
    if (!taskBars && sched) taskBars = `<div class="no-sched">Geen taken</div>`;
    if (!sched) taskBars = `<div class="no-sched" style="font-size:8px">Geen data</div>`;

    grid.innerHTML += `
      <div class="sched-day-mini ${isToday ? 'today' : ''}" onclick="selectDay(${i})" style="cursor:pointer;${muted ? 'opacity:0.5' : ''}">
        <div>
          <span class="sched-day-icon">${getWeatherIcon(w.code)}</span>
          <div class="sched-day-header">${isToday ? 'Vandaag' : days[d.getDay()]}</div>
          <div class="sched-day-date">${d.getDate()}/${d.getMonth()+1}</div>
        </div>
        <div style="margin-top:6px">${taskBars}</div>
        ${tasks.length > 0 ? `<div style="font-size:9px;color:var(--text3);margin-top:3px">${tasks.length} beurt${tasks.length !== 1 ? 'en' : ''}</div>` : ''}
      </div>`;
  }
}

function selectDay(offset) {
  selectedDay = offset;
  renderDayDetail();
}

function renderDayDetail() {
  const d = getDateOffset(selectedDay);
  const isToday = selectedDay === 0;
  const isTomorrow = selectedDay === 1;
  const label = isToday ? 'Vandaag' : daysLong[d.getDay()] + ' ' + d.getDate() + '/' + (d.getMonth()+1);
  document.getElementById('day-detail-label').textContent = label;

  const level = isToday ? WATER_L : null;
  const pct = level !== null ? Math.min((level / MAX_L) * 100, 100) : 0;
  document.getElementById('day-mini-fill').style.height = pct + '%';
  document.getElementById('day-level-val').textContent = level !== null ? level.toFixed(1) + ' L' : '—';
  document.getElementById('day-level-sub').textContent = level !== null ? `${pct.toFixed(0)}% vol` : 'Geen data';

  const sched = isToday ? todaySched : isTomorrow ? tomorrowSched : null;
  const tasksEl = document.getElementById('day-tasks');
  if (!sched) { tasksEl.innerHTML = '<span style="color:var(--text3);font-style:italic">Geen schema beschikbaar</span>'; return; }
  const tasks = sched.map((s,i) => s !== '-' ? `<div style="display:flex;align-items:center;gap:6px;padding:2px 0">
    <span style="background:${typeColor[s]};color:${typeText[s]};border-radius:3px;padding:1px 7px;font-size:11px;font-weight:500">${typeMap[s]}</span>
    <span style="font-size:12px;color:var(--text2)">${slots[i]}</span>
  </div>` : null).filter(Boolean);
  tasksEl.innerHTML = tasks.length ? tasks.join('') : '<span style="color:var(--text3);font-style:italic">Geen taken gepland</span>';
}

function openModal() {
  editToday = [...todaySched];
  editTomorrow = [...tomorrowSched];
  modalTab = 'today';
  renderModalBody();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOut(e) { if (e.target === document.getElementById('modal')) closeModal(); }
function switchModalTab(tab) {
  modalTab = tab;
  document.getElementById('tab-today').className = 'modal-tab ' + (tab==='today'?'active':'');
  document.getElementById('tab-tomorrow').className = 'modal-tab ' + (tab==='tomorrow'?'active':'');
  renderModalBody();
}

function renderModalBody() {
  const body = document.getElementById('modal-body');
  const sched = modalTab === 'today' ? editToday : editTomorrow;
  const vals = ['-','1','2','3','f'];
  const labels = ['Uit','Sip','Rustig','Zwaar','Vloed'];
  const pillClasses = ['off','p1','p2','p3','pf'];

  body.innerHTML = `
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px">
      Klik op een optie om een tijdslot in te stellen. Elk blok van 30 min. is individueel instelbaar.
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${vals.map((v,i) => `<span style="display:flex;align-items:center;gap:4px;font-size:11px"><span class="pill ${pillClasses[i]}">${labels[i]}</span></span>`).join('')}
    </div>` +
    slots.map((slot, idx) => {
      const cur = sched[idx];
      return `<div class="sched-row">
        <div class="sched-time">${slot}</div>
        <div class="sched-pills">
          ${vals.map((v,i) => `<span class="pill ${cur===v ? pillClasses[i] : 'off'}" onclick="setSlot(${idx},'${v}')" data-slot="${idx}" data-val="${v}">${labels[i]}</span>`).join('')}
        </div>
      </div>`;
    }).join('');
}

function setSlot(idx, val) {
  if (modalTab === 'today') editToday[idx] = val;
  else editTomorrow[idx] = val;
  const row = document.getElementById('modal-body').querySelectorAll('.sched-row')[idx];
  const pills = row.querySelectorAll('.pill');
  const vals = ['-','1','2','3','f'];
  const pillClasses = ['off','p1','p2','p3','pf'];
  pills.forEach((p, i) => { p.className = 'pill ' + (vals[i] === val ? pillClasses[i] : 'off'); });
}

function saveSchedule() {
  todaySched = [...editToday];
  tomorrowSched = [...editTomorrow];
  cancelRainy = document.getElementById('rain-toggle').checked;
  closeModal();
  renderScheduleGrid();
  renderDayDetail();
  updateRainHint();
}

document.getElementById('rain-toggle').addEventListener('change', () => {
  cancelRainy = document.getElementById('rain-toggle').checked;
  updateRainHint();
  renderScheduleGrid();
});

initBattery();
initWater();
loadWeather();
</script>
